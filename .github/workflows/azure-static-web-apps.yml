# Azure Static Web Apps CI/CD for FinFacts (shark education site).
#
# Deploys the Astro static build to Azure Static Web Apps (Free tier) and
# creates an ephemeral preview environment for every pull request, cleaned up
# automatically when the PR closes.
#
# REQUIRED GITHUB SECRETS
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#                                    OIDC identifiers for azure/login. Used by
#                                    build_and_deploy (to provision the SWA from
#                                    Bicep when missing and fetch a fresh
#                                    deployment token), close_pull_request, and
#                                    teardown. Created by infra/setup-teardown-oidc.ps1.
#   GITHUB_TOKEN                     Provided automatically by Actions; used by the
#                                    SWA action to post the PR preview URL comment.
#
# OPTIONAL SECRETS (forwarded to the build so prebuild can bake richer data)
#   IUCN_API_TOKEN                   IUCN Red List v4 bearer token (non-commercial).
#
# SELF-PROVISIONING DEPLOY
#   build_and_deploy logs in via OIDC, ensures the Static Web App exists
#   (deploying infra/main.bicep if it was never created or was torn down), then
#   retrieves the live deployment token at run time. This means no static
#   AZURE_STATIC_WEB_APPS_API_TOKEN secret is needed and deploys keep working
#   across teardown/re-provision cycles (a stale token would be rejected with
#   "No matching Static Web App was found or the api key was invalid").
#
# NOTE ON THE SLOW PREBUILD
#   `npm run build` runs scripts/fetch-occurrences.mjs (GBIF + OBIS occurrence
#   fetch, ~2-3 min). That script is offline/failure-tolerant by design (it logs
#   warnings and never throws), so the build still succeeds in CI even if an API
#   is unreachable. We build ourselves and deploy with skip_app_build so Oryx
#   does not re-run a build we already control.
#
# MANUAL TEARDOWN (destructive)
#   The `teardown` job deletes the Static Web App resource and, when the
#   `delete_resource_group` input is true, the entire resource group (all
#   resources in it). It only runs via the "Run workflow" button
#   (workflow_dispatch) and is gated by the `production-teardown` GitHub
#   Environment. Add required reviewers to that environment under repo Settings >
#   Environments so a human must approve the run before any resource is deleted.
#   Azure auth uses OIDC (no stored secret),
#   which requires these repo/environment secrets/variables:
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   and a federated credential on the app registration whose subject is the
#   ENVIRONMENT subject (not a branch):
#     repo:devopsabcs-engineering/finfacts:environment:production-teardown
#   Run infra/setup-teardown-oidc.ps1 to create the app registration, federated
#   credential, role assignment, and the three secrets in one step.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Resource group containing the Static Web App"
        required: false
        default: rg-finfacts
        type: string
      static_web_app_name:
        description: "Name of the Static Web App to delete"
        required: false
        default: finfacts
        type: string
      delete_resource_group:
        description: "Also delete the entire resource group (removes ALL resources in it)"
        required: false
        default: false
        type: boolean
      confirm:
        description: 'Teardown ONLY: type "DELETE" to permanently remove resources (leave blank to just deploy)'
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    # Skip on PR "closed" events — that path is handled by close_pull_request.
    # On manual dispatch, deploy unless the run is a teardown (confirm == DELETE).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'DELETE')
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # astro build → prebuild data fetch + Pagefind index + sitemap + images.
        run: npm run build
        env:
          # Forwarded if configured; safe to be empty (script falls back to OBIS).
          IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Static Web App exists
        id: ensure_swa
        env:
          RESOURCE_GROUP: rg-finfacts
          SWA_NAME: finfacts
          LOCATION: eastus2
        run: |
          set -euo pipefail
          # Create the resource group if it does not exist.
          if ! az group exists --name "$RESOURCE_GROUP" | grep -q true; then
            echo "Creating resource group '$RESOURCE_GROUP'..."
            az group create --name "$RESOURCE_GROUP" --location "$LOCATION" -o none
          fi
          # Provision the Static Web App from Bicep if it is missing (idempotent).
          if ! az staticwebapp show --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Static Web App '$SWA_NAME' not found; provisioning from infra/main.bicep..."
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters name="$SWA_NAME" location="$LOCATION" sku=Free \
              -o none
          else
            echo "Static Web App '$SWA_NAME' already exists."
          fi
          # Retrieve the current deployment token and expose it as a masked output.
          TOKEN="$(az staticwebapp secrets list --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" --query 'properties.apiKey' -o tsv)"
          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to retrieve Static Web App deployment token."
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Use the freshly retrieved token so deploys keep working even after a
          # teardown/re-provision cycle (the stale repo secret would be invalid).
          azure_static_web_apps_api_token: ${{ steps.ensure_swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # We already ran `npm run build`; deploy the prebuilt output directly.
          # With skip_app_build, the action treats app_location as the artifacts
          # folder, so point it at dist/ (which contains index.html and the
          # staticwebapp.config.json emitted from public/).
          app_location: "dist"
          output_location: ""
          skip_app_build: true

  close_pull_request:
    # Tear down the preview environment when a PR is closed (merged or not).
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Close Pull Request Preview
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment token
        id: token
        env:
          RESOURCE_GROUP: rg-finfacts
          SWA_NAME: finfacts
        run: |
          set -euo pipefail
          if ! az staticwebapp show --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::notice::Static Web App '$SWA_NAME' not found; nothing to close."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TOKEN="$(az staticwebapp secrets list --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" --query 'properties.apiKey' -o tsv)"
          echo "::add-mask::$TOKEN"
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Close preview environment
        if: steps.token.outputs.exists == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.token }}
          action: "close"

  teardown:
    # Destructive: deletes the Static Web App resource. Manual-only, and the
    # `production-teardown` environment forces an approval gate before it runs.
    # Configure required reviewers under repo Settings > Environments.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'DELETE'
    name: Teardown Static Web App
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-teardown
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Static Web App
        env:
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          SWA_NAME: ${{ github.event.inputs.static_web_app_name }}
        run: |
          set -euo pipefail
          echo "Looking up Static Web App '$SWA_NAME' in resource group '$RESOURCE_GROUP'..."
          if az staticwebapp show --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Deleting Static Web App '$SWA_NAME'..."
            az staticwebapp delete --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" --yes
            echo "::notice::Static Web App '$SWA_NAME' deleted from '$RESOURCE_GROUP'."
          else
            echo "::notice::Static Web App '$SWA_NAME' not found in '$RESOURCE_GROUP'; skipping resource delete."
          fi

      - name: Delete resource group
        if: ${{ github.event.inputs.delete_resource_group == 'true' }}
        env:
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
        run: |
          set -euo pipefail
          if az group exists --name "$RESOURCE_GROUP" | grep -q true; then
            echo "Deleting resource group '$RESOURCE_GROUP' (this removes ALL resources in it)..."
            az group delete --name "$RESOURCE_GROUP" --yes
            echo "::notice::Resource group '$RESOURCE_GROUP' deleted."
          else
            echo "::notice::Resource group '$RESOURCE_GROUP' not found; nothing to delete."
          fi

