# Quality gates for FinFacts: accessibility (axe-core / WCAG 2.2 AA) and
# Lighthouse CI (performance, SEO, a11y, Core Web Vitals).
#
# Runs on every push to main and every pull request. Uses the fast build path
# (SKIP_DATA_FETCH=1) so these gates do not pay the slow network-bound data
# fetch — they audit the committed public/data baseline, which is sufficient for
# markup, SEO, and layout-stability checks.
#
# No secrets required. Lighthouse results upload to temporary public storage.

name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  accessibility:
    name: Accessibility (axe-core, WCAG 2.2 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site (fast path, reuse baked data)
        run: npm run build
        env:
          SKIP_DATA_FETCH: "1"

      - name: Run axe-core accessibility gate
        run: npm run lint:a11y

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (fast path, reuse baked data)
        run: npm run build
        env:
          SKIP_DATA_FETCH: "1"

      - name: Run Lighthouse CI
        run: npm run lint:lhci
